# Render Blueprint - Trinidad News Comparer
#
# Deploy with:
#   render blueprint launch
# or connect this repo to Render and it auto-detects render.yaml.
#
# Free tier:
#   - Web service spins down after 15 min idle (cold start ~30s on next visit)
#   - Worker is OPTIONAL - the app works without it (cache misses scrape live)
#   - 750 hours/month total across all services
#
# Upgrade to Starter ($7/mo each) for:
#   - Always-on web service (no cold starts)
#   - Background worker keeps cache warm so responses are faster

services:
  # Web Service
  - type: web
    name: trinidad-news-comparer
    runtime: node
    repo: https://github.com/YOUR_USER/trinidad-news-comparer  # change me
    plan: free
    region: virginia

    buildCommand: npm run build
    startCommand: npm run start

    healthCheckPath: /api/cache/health

    envVars:
      - key: NODE_ENV
        value: production
      - key: NVIDIA_NIM_API_KEY
        sync: false
      - key: UPSTASH_REDIS_URL
        sync: false
      - key: UPSTASH_REDIS_TOKEN
        sync: false
      - key: PUSHER_APP_ID
        sync: false
      - key: PUSHER_KEY
        sync: false
      - key: PUSHER_SECRET
        sync: false
      - key: PUSHER_CLUSTER
        value: us2
      - key: VITE_PUSHER_KEY
        sync: false
      - key: VITE_PUSHER_CLUSTER
        value: us2
      - key: APP_URL
        value: https://trinidad-news-comparer.onrender.com  # change me

  # Background Worker (optional - comment out on free tier to save hours)
  # - type: worker
  #   name: trinidad-news-comparer-worker
  #   runtime: node
  #   repo: https://github.com/YOUR_USER/trinidad-news-comparer
  #   plan: free
  #   region: virginia
  #   buildCommand: npm run build
  #   startCommand: npm run start:worker
  #   envVars:
  #     - key: NODE_ENV
  #       value: production
  #     - key: UPSTASH_REDIS_URL
  #       sync: false
  #     - key: UPSTASH_REDIS_TOKEN
  #       sync: false
  #     - key: WORKER_SCRAPE_INTERVAL_MINUTES
  #       value: "5"
