version: "3.9"

# ============================================================================
# Shared network so containers can reach each other by name
# ============================================================================
networks:
  news-net:
    driver: bridge

# ============================================================================
# Volumes
# ============================================================================
volumes:
  # Used by the worker to persist crawl state (optional)
  news_cache:
    driver: local

# ============================================================================
# Services
# ============================================================================
services:
  # ==========================================================================
  # Main web service — serves the React SPA + API endpoints
  # ==========================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_BASE_URL: ${VITE_BASE_URL:-/news/}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/news}
        VITE_PUSHER_KEY: ${VITE_PUSHER_KEY}
        VITE_PUSHER_CLUSTER: ${VITE_PUSHER_CLUSTER:-us2}
    container_name: trinidad-news-comparer
    restart: unless-stopped
    ports:
      # Bind to 127.0.0.1 only — Nginx on the Pi host handles public traffic
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - NVIDIA_NIM_API_KEY=${NVIDIA_NIM_API_KEY}
      - UPSTASH_REDIS_URL=${UPSTASH_REDIS_URL}
      - UPSTASH_REDIS_TOKEN=${UPSTASH_REDIS_TOKEN}
      - PUSHER_APP_ID=${PUSHER_APP_ID}
      - PUSHER_KEY=${PUSHER_KEY}
      - PUSHER_SECRET=${PUSHER_SECRET}
      - PUSHER_CLUSTER=${PUSHER_CLUSTER:-us2}
      - VITE_PUSHER_KEY=${VITE_PUSHER_KEY}
      - VITE_PUSHER_CLUSTER=${VITE_PUSHER_CLUSTER:-us2}
      - APP_URL=${APP_URL:-http://localhost:3000}
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/cache/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - news-net

  # ==========================================================================
  # Background worker — keeps the article cache warm by scraping sources
  # on a timer. Without it, the app still works (cache misses trigger live
  # scrapes), but responses are slower.
  # ==========================================================================
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: trinidad-news-comparer-worker
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - UPSTASH_REDIS_URL=${UPSTASH_REDIS_URL}
      - UPSTASH_REDIS_TOKEN=${UPSTASH_REDIS_TOKEN}
      - WORKER_SCRAPE_INTERVAL_MINUTES=${WORKER_SCRAPE_INTERVAL_MINUTES:-5}
    env_file:
      - .env
    depends_on:
      - app
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - news-net
