# =============================================================================
# Nginx location block for Trinidad News Comparer
#
# Add this INSIDE your existing `server` block in
# `/etc/nginx/sites-available/main`, alongside the other location blocks:
#
#   location /jenkins/  { ... }
#   location /pgadmin/  { ... }
#   location /n8n/      { ... }
#   location /news/     { ... }   ← add this one
#
# The app is served at  https://swepi.tail24d0db.ts.net/news/
# =============================================================================

location /news/ {
    # Trailing slash on proxy_pass strips the /news/ prefix so Express
    # receives clean paths (e.g. /api/news/compare instead of /news/api/...).
    proxy_pass http://127.0.0.1:3000/;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # LLM requests can take 2-3 minutes — don't timeout
    proxy_connect_timeout 90s;
    proxy_send_timeout 180s;
    proxy_read_timeout 180s;

    # Pusher WebSocket upgrade (if used directly, though Pusher is a
    # separate service so this is mainly for future use)
    proxy_set_header X-Forwarded-Host $host;

    client_max_body_size 2m;
}
